<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Security Headers -->

    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.gpteng.co https://js.stripe.com https://checkout.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://nuxixhoogohqligzgbdm.supabase.co https://api.stripe.com https://checkout.stripe.com wss://nuxixhoogohqligzgbdm.supabase.co; frame-src https://js.stripe.com https://checkout.stripe.com https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self';"
    />

    <!-- Branding -->
    <title>Swish View | YouTube Promotion | Real Views. Real Growth.</title>
    <meta
      name="title"
      content="Swish View | YouTube Promotion | Real Views. Real Growth."
    />
    <meta
      name="description"
      content="Boost your YouTube videos with Swish View — real views, fast growth, smart targeting. Trusted by creators worldwide for organic YouTube growth."
    />
    <meta
      name="keywords"
      content="swish view, youtube promotion, real views, video marketing, grow youtube, viral video campaign, organic youtube growth, youtube views, video promotion"
    />
    <meta name="author" content="Swish View Team" />
    
    <!-- Application Name for OAuth verification -->
    <meta name="application-name" content="Swish View">
    <meta name="apple-mobile-web-app-title" content="Swish View">

    <!-- Preload main fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="/brockmann-medium-webfont.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.swishview.com/" />
    <meta
      property="og:title"
      content="Swish View | YouTube Promotion | Real Views. Real Growth."
    />
    <meta
      property="og:description"
      content="Boost your YouTube videos with Swish View — real views, fast growth, smart targeting. Trusted by creators worldwide."
    />
    <meta
      property="og:image"
      content="https://www.swishview.com/lovable-uploads/c66edb9b-3295-47cd-be47-4d81e262a4ff.png"
    />
    <meta property="og:image:secure_url" content="https://www.swishview.com/lovable-uploads/c66edb9b-3295-47cd-be47-4d81e262a4ff.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Swish View — YouTube Promotion" />
    <meta property="og:site_name" content="Swish View" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.swishview.com/" />
    <meta
      property="twitter:title"
      content="Swish View | YouTube Promotion | Real Views. Real Growth."
    />
    <meta
      property="twitter:description"
      content="Boost your YouTube videos with Swish View — real views, fast growth, smart targeting. Trusted by creators worldwide."
    />
    <meta
      property="twitter:image"
      content="https://www.swishview.com/lovable-uploads/c66edb9b-3295-47cd-be47-4d81e262a4ff.png"
    />

    <!-- Canonical Link -->
    <link rel="canonical" href="https://www.swishview.com/" />

    <!-- Google Search Console verification (file-based primary) -->
    <meta name="google-site-verification" content="googleeb739b9bd7520d4d" />

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://www.swishview.com/sitemap.xml" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="/lovable-uploads/c66edb9b-3295-47cd-be47-4d81e262a4ff.png"
      type="image/png"
    />

    <!-- Schema.org JSON-LD for App/Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Organization", "SoftwareApplication"],
        "name": "Swish View",
        "applicationCategory": "YouTube Promotion Service",
        "operatingSystem": "Web Browser",
        "url": "https://www.swishview.com",
        "logo": "https://www.swishview.com/lovable-uploads/c66edb9b-3295-47cd-be47-4d81e262a4ff.png",
        "description": "Swish View helps YouTube creators grow with real views, fast growth, and smart targeting. Trusted by thousands of creators worldwide.",
        "offers": {
          "@type": "Offer",
          "description": "YouTube Promotion Services"
        },
        "sameAs": [
          "https://twitter.com/swishview",
          "https://youtube.com/swishview"
        ],
        "keywords": "Swish View, youtube promotion, real views, video marketing"
      }
    </script>

    <!-- Additional WebApplication Schema for OAuth verification -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Swish View",
        "applicationCategory": "YouTube Marketing Platform",
        "url": "https://www.swishview.com",
        "description": "Swish View - YouTube Promotion Platform for Real Views and Growth",
        "author": {

          "name": "Swish View"
        }

    <style>

      @media (max-width: 768px) {
        html {
          height: 100%;
          overflow: auto;
          -webkit-overflow-scrolling: touch;
        }
        body {
          min-height: 100%;
          min-height: 100dvh;
